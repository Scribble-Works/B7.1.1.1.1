<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Numbers Model Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Mega Numbers Model Game</h1>

        <div id="start-screen" class="screen active">
            <h2>B7.1.1.1.1: Modeling Quantities > 1,000,000,000</h2>
            <p>Your goal is to choose the correct model (using Billion Blocks 'B' and Million Blocks 'M') for the given large number. There are 10 questions.</p>
            <p><strong>Remember:</strong> 1 B = 1,000 M</p>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="quiz-screen" class="screen">
            <h2 id="question-number">Question 1/10</h2>
            <p id="question-text"></p>
            <div id="options-container" class="options-grid">
                </div>
        </div>

        <div id="game-over-screen" class="screen">
            <h2>Game Over! 🥳</h2>
            <p id="final-score"></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
